name: Security Audit (NPM)

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly scan
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run NPM Audit
        run: npm audit --audit-level=high
